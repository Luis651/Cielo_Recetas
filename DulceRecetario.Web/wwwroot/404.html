<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Cielo Recetas 🍓</title>
    <script type="text/javascript">
        // Single Page Apps for GitHub Pages
        // This script takes the current URL and converts the path and query
        // string into a query string, then redirects the browser to index.html
        var pathSegmentsToKeep = 0; 

        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>
<body>
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #ff4d6d;">
        <h3>Cargando tu Cielo Dulce... 🍰</h3>
    </div>
</body>
</html>
